databaseChangeLog:
  - changeSet:
      id: add-view-count-to-vendor-profiles
      author: backend-team
      changes:
        - addColumn:
            tableName: vendor_profiles
            columns:
              - column:
                  name: view_count
                  type: integer
                  defaultValue: 0
                  constraints:
                    nullable: false

  - changeSet:
      id: migrate-certifications-to-jsonb
      author: backend-team
      changes:
        - sqlFile:
            path: ../ddl/002_migrate_certifications_to_jsonb.sql
            relativeToChangelogFile: true
