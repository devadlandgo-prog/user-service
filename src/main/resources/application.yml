server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/landgo
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: users
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.json
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET:myVeryLongSecretKeyThatIsAtLeast256BitsForHS256Algorithm2024!}
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000
  mail:
    from: ${MAIL_FROM:noreply@landgo.com}
    reset-password-url: ${RESET_PASSWORD_URL:http://localhost:3000/reset-password}
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    apple:
      client-id: ${APPLE_CLIENT_ID:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
